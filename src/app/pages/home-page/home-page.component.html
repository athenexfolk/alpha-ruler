<div>
    <div class="flex flex-col md:flex-row justify-center items-center p-3 logo-wrapper">
        <div class="w-full md:w-1/2 p-3 flex justify-center items-center">
            <img class="logo" src="assets/images/logo/logo-dark.svg">
        </div>
        <div class="w-full md:w-1/2 p-3 flex flex-col items-center">
            <h1 class="text-4xl text-center">AlphaRuler</h1>
            <p>เป็นแหล่งการเรียนรู้...</p>
            <div class="flex flex-col md:flex-row">
                <button class="bg-slate-700 rounded p-3 m-3 text-white hover:bg-slate-900" routerLink="/lesson">เริ่มต้นบทเรียน</button>
                <button class="bg-slate-700 rounded p-3 m-3 text-white hover:bg-slate-900" routerLink="/calculator">ค้นหาการคำนวณ</button>
            </div>
        </div>
    </div>
</div>
<div class="min-h-screen bg-slate-50">
    <div class="p-5">
        <h1 class="text-4xl text-center">บทเรียนล่าสุด</h1>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 m-5">
            <div *ngFor="let lesson of lessonList" class="p-3 bg-slate-900 text-white text-center rounded-md flex items-center cursor-pointer" routerLink="/lesson/{{lesson.id}}">
                <div class="w-14 h-14">
                    <img src="assets/images/math/{{lesson.id}}/img.svg" class="w-14 h-14">
                </div>
                <div class="flex-auto text-center">
                    <p>{{lesson.name_th}}</p>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="min-h-screen bg-slate-100">
    <div class="p-5">
        <h1 class="text-4xl text-center">เครื่องคำนวณล่าสุด</h1>
        <app-calculator-page></app-calculator-page>
    </div>
</div>
